<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IFL Tracker — Indoor Football League</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    .home-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    @media (max-width: 720px) { .home-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-head {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-head h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    .card-head a {
      font-size: 0.75rem;
      color: var(--gold);
      text-decoration: none;
    }
    .card-head a:hover { text-decoration: underline; }

    .trans-list { list-style: none; }
    .trans-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .trans-item:last-child { border-bottom: none; }

    .trans-meta { flex: 1; min-width: 0; }
    .trans-name { font-weight: 600; font-size: 0.88rem; color: var(--white); }
    .trans-detail { color: var(--subtle); font-size: 0.78rem; margin-top: 0.15rem; }
    .trans-date { color: var(--muted); font-size: 0.72rem; margin-top: 0.2rem; }

    /* mini standings */
    .mini-standings { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .mini-standings th {
      padding: 0.4rem 0.75rem;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      background: var(--dark);
      border-bottom: 1px solid var(--border);
    }
    .mini-standings td { padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--border); }
    .mini-standings tr:last-child td { border-bottom: none; }
    .mini-standings .team-name { font-weight: 600; color: var(--white); }
    .mini-standings .wl { color: var(--subtle); }
    .mini-standings .pct { color: var(--text); font-weight: 600; text-align: right; }
    .conf-label {
      padding: 0.35rem 0.75rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(240,180,41,0.06);
      border-bottom: 1px solid var(--border);
    }

    .hero {
      background: linear-gradient(135deg, var(--dark) 0%, #1a1a22 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .hero-text h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: 0.02em;
      line-height: 1.1;
    }
    .hero-text h1 span { color: var(--gold); }
    .hero-text p { color: var(--subtle); margin-top: 0.4rem; font-size: 0.88rem; }
    .hero-stats {
      display: flex;
      gap: 2rem;
      flex-shrink: 0;
    }
    .hero-stat { text-align: center; }
    .hero-stat .num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--gold);
    }
    .hero-stat .lbl { font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
    @media (max-width: 600px) {
      .hero { flex-direction: column; align-items: flex-start; }
      .hero-stats { gap: 1.25rem; }
    }
  </style>
</head>
<body data-page="home">
<script src="/js/shared.js"></script>

<div class="page">
  <div class="hero">
    <div class="hero-text">
      <h1>IFL <span>2026</span></h1>
      <p>Roster moves, standings &amp; transactions — updated weekly.</p>
    </div>
    <div class="hero-stats" id="heroStats">
      <div class="hero-stat"><div class="num" id="statPlayers">—</div><div class="lbl">Players</div></div>
      <div class="hero-stat"><div class="num" id="statTeams">—</div><div class="lbl">Teams</div></div>
      <div class="hero-stat"><div class="num" id="statMoves">—</div><div class="lbl">Recent Moves</div></div>
    </div>
  </div>

  <div class="home-grid">
    <!-- Recent Transactions -->
    <div class="card">
      <div class="card-head">
        <h2>Recent Transactions</h2>
        <a href="/transactions.html">View all →</a>
      </div>
      <ul class="trans-list" id="recentTrans">
        <li class="trans-item"><div class="trans-meta"><div class="spinner" style="margin:0"></div></div></li>
      </ul>
    </div>

    <!-- Standings snapshot -->
    <div class="card">
      <div class="card-head">
        <h2>Standings</h2>
        <a href="/standings.html">Full standings →</a>
      </div>
      <div id="miniStandings"><div class="state-box" style="padding:2rem"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<script>
async function loadHome() {
  try {
    // Stats
    const [teamsRes, transRes, rosterRes] = await Promise.all([
      apiFetch('/api/teams'),
      apiFetch('/api/transactions?limit=10'),
      apiFetch('/api/roster'),
    ]);

    document.getElementById('statPlayers').textContent = rosterRes.length;
    document.getElementById('statTeams').textContent = teamsRes.length;
    document.getElementById('statMoves').textContent = transRes.total || transRes.transactions?.length || 0;

    // Recent transactions
    const tlist = document.getElementById('recentTrans');
    const trans = transRes.transactions || [];
    if (!trans.length) {
      tlist.innerHTML = '<li class="trans-item"><div class="trans-meta" style="color:var(--muted)">No transactions yet.</div></li>';
    } else {
      tlist.innerHTML = trans.slice(0, 8).map(t => `
        <li class="trans-item">
          <div>${transBadge(t.trans_type)}</div>
          <div class="trans-meta">
            <div class="trans-name">${t.first_name} ${t.last_name}</div>
            <div class="trans-detail">${t.team_name} · ${t.position || '—'}</div>
            <div class="trans-date">${fmtDate(t.trans_date)}</div>
          </div>
        </li>`).join('');
    }

    // Mini standings
    const standings = await apiFetch('/api/standings');
    const byConf = {};
    standings.forEach(s => {
      if (!byConf[s.conference]) byConf[s.conference] = [];
      byConf[s.conference].push(s);
    });

    const ms = document.getElementById('miniStandings');
    if (!standings.length) {
      ms.innerHTML = '<div class="state-box" style="padding:2rem;color:var(--muted)">No standings yet.</div>';
    } else {
      let html = '<table class="mini-standings">';
      Object.entries(byConf).forEach(([conf, teams]) => {
        html += `<tr><td colspan="4" class="conf-label">${conf}</td></tr>`;
        html += `<tr><th>Team</th><th>GP</th><th>W-L</th><th style="text-align:right">PCT</th></tr>`;
        teams.forEach(t => {
          const cl = t.clinched ? ` <span style="color:var(--gold);font-size:0.65rem">${t.clinched}</span>` : '';
          html += `<tr>
            <td class="team-name">${t.team_name}${cl}</td>
            <td class="wl">${t.gp}</td>
            <td class="wl">${t.wins}-${t.losses}</td>
            <td class="pct">${(+t.win_pct).toFixed(3)}</td>
          </tr>`;
        });
      });
      html += '</table>';
      ms.innerHTML = html;
    }
  } catch (e) {
    console.error(e);
  }
}

loadHome();
</script>
</body>
</html>
